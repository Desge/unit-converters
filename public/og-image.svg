<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Icon -->
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="url(#accent)"/>
    <text x="40" y="55" font-family="system-ui,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">⇄</text>
  </g>
  <!-- Title -->
  <text x="100" y="250" font-family="system-ui,sans-serif" font-size="56" font-weight="800" fill="white">UnitConvert</text>
  <text x="100" y="320" font-family="system-ui,sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">Free Online Unit Converter</text>
  <!-- Features -->
  <g transform="translate(100, 400)">
    <rect x="0" y="0" width="300" height="56" rx="28" fill="rgba(255,255,255,0.06)"/>
    <text x="28" y="36" font-family="system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">⚡ Instant Conversion</text>
  </g>
  <g transform="translate(430, 400)">
