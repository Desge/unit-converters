    <text x="28" y="36" font-family="system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">🌍 6 Languages</text>
  </g>
  <g transform="translate(720, 400)">
    <rect x="0" y="0" width="280" height="56" rx="28" fill="rgba(255,255,255,0.06)"/>
    <text x="28" y="36" font-family="system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">📊 9 Categories</text>
  </g>
